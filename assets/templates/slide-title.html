<!doctype html>
<!--
  IFQ Design Skills · Template T-slide-title
  1920×1080 IFQ-native title slide.
  Intended to be exported via scripts/export_deck_pptx.mjs into a real PPTX.
-->
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="ifq:created-at" content="{ CREATED_AT · optional ISO-8601, defaults to now }"/>
<title>{ TALK TITLE } · ifq.ai keynote</title>
<!-- China-safe default: no remote font request. See references/font-loading.md to opt into Google Fonts. -->
<style>
  :root {
    --ifq-accent:#D4532B; --ifq-ink:#111; --ifq-paper:#FAF7F2; --ifq-cream:#F1EBE0;
    --ifq-display:'Newsreader','Noto Serif SC','Source Han Serif SC','Songti SC',STSong,Georgia,serif;
    --ifq-sans:-apple-system,BlinkMacSystemFont,'SF Pro Text','PingFang SC','Microsoft YaHei','Noto Sans CJK SC','Source Han Sans SC',Arial,sans-serif;
    --ifq-mono:'JetBrains Mono','SF Mono','Cascadia Mono','Microsoft YaHei Mono',ui-monospace,Menlo,Consolas,monospace;
  }
  html, body { margin: 0; padding: 0; background:#222; font-family: var(--ifq-sans); }
  .slide { width: 1920px; height: 1080px; background: var(--ifq-paper); color: var(--ifq-ink); position: relative; padding: 96px 128px; display: flex; flex-direction: column; justify-content: space-between; }
  .rule { position: absolute; top: 96px; bottom: 96px; left: 96px; width: 4px; background: var(--ifq-accent); }

  .eyebrow { font-family: var(--ifq-mono); font-size: 18px; letter-spacing: 3px; text-transform: uppercase; color: var(--ifq-accent); }
  .title { font-family: var(--ifq-display); font-weight: 700; font-size: 180px; line-height: 0.96; letter-spacing: -4px; margin: 40px 0 48px; text-wrap: pretty; }
  .title em { font-style: italic; color: #A83518; }
  .sub { font-family: var(--ifq-display); font-style: italic; font-size: 40px; color: #3A3532; max-width: 1100px; line-height: 1.35; }

  .meta { display: flex; justify-content: space-between; align-items: flex-end; font-family: var(--ifq-mono); font-size: 18px; color: #3A3532; }
  .meta__left { display: flex; gap: 48px; }
  .meta__left b { color: var(--ifq-ink); font-weight: 600; }

  .stamp { display: inline-flex; align-items: center; gap: 12px; padding: 10px 18px; border: 2px solid var(--ifq-accent); font-family: var(--ifq-mono); font-size: 14px; letter-spacing: 2px; text-transform: uppercase; color: var(--ifq-ink); }
  .stamp svg { width: 16px; height: 16px; }

  .spark-cluster { position: absolute; right: 160px; top: 180px; display: flex; gap: 28px; align-items: center; }
  .spark-cluster svg { width: 96px; height: 96px; }
  .spark-cluster .small { width: 42px; height: 42px; opacity: 0.7; }

  /* ---- Responsive: tablet ---- */
  @media (max-width: 1024px) {
    .slide { width: 100%; height: auto; min-height: 100vh; padding: 64px 80px; }
    .rule { top: 64px; bottom: 64px; left: 64px; }
    .title { font-size: 120px; letter-spacing: -3px; }
    .sub { font-size: 32px; max-width: 720px; }
    .spark-cluster { right: 100px; top: 120px; }
    .spark-cluster svg { width: 72px; height: 72px; }
    .spark-cluster .small { width: 32px; height: 32px; }
    .meta { flex-direction: column; gap: 24px; align-items: flex-start; }
  }

  /* ---- Responsive: mobile ---- */
  @media (max-width: 640px) {
    body { background: var(--ifq-paper); }
    .slide { width: 100%; height: auto; min-height: auto; padding: 32px 24px; }
    .rule { display: none; }
    .spark-cluster { position: static; margin-bottom: 24px; gap: 16px; }
    .spark-cluster svg { width: 56px; height: 56px; }
    .spark-cluster .small { width: 24px; height: 24px; }
    .eyebrow { font-size: 14px; letter-spacing: 2px; }
    .title { font-size: 64px; letter-spacing: -1.5px; line-height: 1.0; }
    .sub { font-size: 22px; }
    .meta { flex-direction: column; gap: 16px; font-size: 14px; }
    .stamp { font-size: 12px; padding: 8px 14px; }
  }

  /* ---- Print ---- */
  @media print {
    body { background: #fff; }
    .slide { width: 100%; height: auto; padding: 20mm; }
    .rule { display: none; }
    .spark-cluster { display: none; }
    .title { font-size: 72px; }
    .sub { font-size: 24px; }
  }

  /* ---- Dark mode ---- */
  @media (prefers-color-scheme: dark) {
    :root {
      --ifq-ink: #F5EFE3;
      --ifq-paper: #141212;
      --ifq-cream: #1C1916;
      --ifq-hairline: #2A2520;
    }
    body { background: #0A0909; }
    .sub { color: #C8BFB0; }
    .meta { color: #C8BFB0; }
  }

  /* ---- Reduced motion ---- */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>
<div class="slide">
  <div class="rule"></div>

  <div class="spark-cluster" aria-hidden="true">
    <svg class="small" viewBox="-12 -12 24 24"><path d="M0 -10 L2.2 -2.2 L10 0 L2.2 2.2 L0 10 L-2.2 2.2 L-10 0 L-2.2 -2.2 Z" fill="#FFB27A"/></svg>
    <svg viewBox="-12 -12 24 24">
      <defs>
        <linearGradient id="tsg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#FFB27A"/><stop offset="1" stop-color="#A83518"/></linearGradient>
      </defs>
      <path d="M0 -10 L2.2 -2.2 L10 0 L2.2 2.2 L0 10 L-2.2 2.2 L-10 0 L-2.2 -2.2 Z" fill="url(#tsg)"/>
    </svg>
  </div>

  <header>
    <div class="eyebrow">{ IFQ KEYNOTE } · <span data-ifq-year></span></div>
  </header>

  <main>
    <h1 class="title">{ Your talk title, <em>italicized punch</em>. }</h1>
    <p class="sub">{ One-line thesis of the talk — 12 to 25 words, italic serif voice. }</p>
  </main>

  <footer class="meta">
    <div class="meta__left">
      <div><b>{ SPEAKER NAME }</b><br/>{ ROLE · COMPANY }</div>
      <div><b>{ EVENT NAME }</b><br/>{ DATE · LOCATION }</div>
    </div>
    <div class="stamp">
      <svg viewBox="-12 -12 24 24"><path d="M0 -10 L2.2 -2.2 L10 0 L2.2 2.2 L0 10 L-2.2 2.2 L-10 0 L-2.2 -2.2 Z" fill="#D4532B"/></svg>
      ifq.ai / <span data-ifq-year></span>
    </div>
  </footer>
</div>
<script>
  (function () {
    function resolveIfqYear(value) {
      if (!value) {
        return null;
      }

      if (value instanceof Date) {
        return Number.isNaN(value.getTime()) ? null : String(value.getFullYear());
      }

      const rawValue = typeof value === 'string' ? value.trim() : value;
      if (!rawValue) {
        return null;
      }

      if (typeof rawValue === 'string') {
        // Parse numeric date strings explicitly so authored dates stay stable across runtimes.
        const match = rawValue.match(
          /^(\d{4})[-/](\d{2})[-/](\d{2})(?:[T\s](\d{2})(?::(\d{2})(?::(\d{2})(\.\d{1,3})?)?)?(?:\s?(Z|[+-]\d{2}:?\d{2}))?)?$/
        );

        if (!match) {
          return null;
        }

        const [, year, month, day] = match;
        const calendarDate = new Date(Number(year), Number(month) - 1, Number(day));
        if (
          Number.isNaN(calendarDate.getTime()) ||
          calendarDate.getFullYear() !== Number(year) ||
          calendarDate.getMonth() + 1 !== Number(month) ||
          calendarDate.getDate() !== Number(day)
        ) {
          return null;
        }

        return year;
      }

      const parsed = new Date(rawValue);
      return Number.isNaN(parsed.getTime()) ? null : String(parsed.getFullYear());
    }

    const metaTag = document.querySelector('meta[name="ifq:created-at"]');
    const candidate =
      window.IFQ_CREATION_DATE ||
      document.documentElement.getAttribute('data-ifq-created-at') ||
      (metaTag && metaTag.getAttribute('content'));
    const year = resolveIfqYear(candidate) || String(new Date().getFullYear());

    document.querySelectorAll('[data-ifq-year]').forEach(function (node) {
      node.textContent = year;
    });
  })();
</script>
</body>
</html>
