version: "3.0.0"

interface:
  display_name: "IFQ Design Skills"
  short_description: "Agent-native design engine: one prompt in, shippable HTML out"
  icon_small: "./assets/ifq-brand/mark.svg"
  icon_large: "./assets/ifq-brand/logo.svg"
  brand_color: "#D4532B"
  default_prompt: "Use $ifq-design-skills to turn this visual-design request into a verified HTML artifact."
  examples:
    # M-01 Launch Film
    - "做一个我们新产品的发布会动画，产品是智能手表"
    # M-02 Personal Brand Page
    - "做一个个人站一页，不要像找工作"
    # M-03 Whitepaper / Report
    - "写一份 2026 年 AI Agent 行业白皮书，PDF 可打印"
    # M-04 Dashboard
    - "内部 AI 做一个 command center，像 Bloomberg 终端"
    # M-05 Comparison / VS
    - "做一个 Figma vs Sketch 横评，5 个维度打分"
    # M-06 Onboarding Flow
    - "设计一个 3 屏 onboarding 引导流程，产品是笔记 App"
    # M-07 Changelog
    - "把 v2.0 的更新做成 changelog 页面"
    # M-08 Keynote / Slides
    - "明天沙龙讲 AI agent 20 分钟，给我一份 deck"
    # M-09 Social Media Kit
    - "把这条产品更新做成 X/Twitter 分享卡 + 小红书封面"
    # M-10 Business Card
    - "设计一张名片，科技感，极简风格"
    # M-11 Brand Diagnosis
    - "帮这个品牌做一次体检，给 3 个升级方向"
    # M-12 Brand System
    - "给新公司从零建立品牌，科技方向"
    # Design Direction Advisor (vague)
    - "帮我做点好看的东西"

policy:
  allow_implicit_invocation: true
  category_tags:
    - design
    - creative
    - html
    - prototype
    - slides
    - motion
    - brand
    - export

  limitations:
    - "Not for production frontend engineering, backend systems, or SEO-critical sites"
    - "Not for pure copy editing with no visual artifact"
    - "Not for deliverables that must round-trip through Word or Google Docs"
    - "MP4/GIF/PDF/PPTX export requires explicit user intent and optional dependencies"
