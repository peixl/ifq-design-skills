name: Feature Request
description: Suggest a new mode, template, or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What kind of improvement is this?
      options:
        - New mode (new deliverable type)
        - New template (new style for existing mode)
        - Export format (PDF, PPTX, MP4, etc.)
        - Agent experience (routing, verification, prompts)
        - Brand / identity system
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve? What's the user scenario?
      placeholder: "When I try to ..., I need to ... but currently ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should it work? What would the deliverable look like?
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative approaches?
    validations:
      required: false
