name: Skills Publish Check

"on":
  push:
    branches:
      - main
    paths:
      - .github/workflows/**
      - SKILL.md
      - README.md
      - README.en.md
      - package.json
      - .well-known/**
      - scripts/**
      - assets/**
      - references/**
  pull_request:
    paths:
      - .github/workflows/**
      - SKILL.md
      - README.md
      - README.en.md
      - package.json
      - .well-known/**
      - scripts/**
      - assets/**
      - references/**

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run unified publish gate
        run: npm run verify:ci